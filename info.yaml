# Tiny Tapeout project information
project:
  title:        "ALU"      # Project title
  author:       "Aadarsha Kandel"      # Your name
  discord:      "mr.kandel"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "Implements a 4-bit ALU that performs arithmetic and logical operations (add, subtract, ADD, OR, XOR, Shift) on two 4-bit operands. There is also output flags for carry, zero, negative, and overflows. AI was used for divsion of bits to plan i/os, creating the comparison model in the testbench, and minor lint errors."      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     100000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_ALU"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "Operand A"      
  ui[1]: "Operand A"
  ui[2]: "Operand A"
  ui[3]: "Operand A (MSB)"
  ui[4]: "Operand B"
  ui[5]: "Operand B"
  ui[6]: "Operand B"
  ui[7]: "Operand B (MSB)"

  # Outputs
  uo[0]: "Result"
  uo[1]: "Result"
  uo[2]: "Result"
  uo[3]: "Result (MSB)"
  uo[4]: "Carry Flag"
  uo[5]: "Zero Flag"
  uo[6]: "Negative Flag"
  uo[7]: "Overflow Flag"

  # Bidirectional pins
  uio[0]: "Opcode"
  uio[1]: "Opcode"
  uio[2]: "Opcode (MSB)"
  uio[3]: "Unused"
  uio[4]: "Unused"
  uio[5]: "Unused"
  uio[6]: "Unused"
  uio[7]: "Unused"

# Do not change!
yaml_version: 6
